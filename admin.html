<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin | Vantix Pro Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea, select { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 12px; color: white; width: 100%; outline: none; transition: 0.3s; margin-bottom: 20px; }
        input:focus, select:focus { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.1); }
        label { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 8px; margin-left: 5px; }
    </style>
</head>
<body class="p-6 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-2xl glass-card p-10 rounded-[2.5rem] shadow-2xl">
        <h1 class="text-2xl font-black text-red-600 mb-8 uppercase tracking-widest italic text-center underline decoration-white/10 underline-offset-8">Vantix Admin Panel</h1>
        
        <label>GitHub Access Token</label>
        <input type="password" id="githubToken" placeholder="Paste Token Here">

        <div class="grid grid-cols-2 gap-6 bg-black/20 p-6 rounded-2xl mb-6 border border-white/5">
            <div>
                <label>App Server Status</label>
                <select id="appServerStatus">
                    <option value="Online">Online</option>
                    <option value="Maintening">Maintening</option>
                    <option value="Disconnected">Disconnected</option>
                    <option value="Crash">Crash</option>
                </select>
            </div>
            <div>
                <label>App Title</label>
                <input type="text" id="appTitle" value="VANTIX Pro">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-x-6">
            <div><label>Version</label><input type="text" id="version"></div>
            <div><label>Platform/Engine</label><input type="text" id="platform"></div>
        </div>

        <label>Upcoming Pipeline (Comma separated for vertical list)</label>
        <input type="text" id="upcoming" placeholder="Live TV, Multi-Server, 4K Support">

        <label>Current Features (Comma separated)</label>
        <input type="text" id="currentFeatures">

        <label>About Description</label>
        <textarea id="about" rows="3"></textarea>

        <button onclick="pushUpdate()" id="btn" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-black uppercase tracking-widest transition-all shadow-lg shadow-red-600/20 active:scale-95">
            Push System Update
        </button>
    </div>

    <script>
        const USER = "kanilkanchana";
        const REPO = "Movie-Stream"; 
        const FILE = "data.json";

        async function pushUpdate() {
            const token = document.getElementById('githubToken').value;
            if(!token) return alert("Security Token Required");
            const btn = document.getElementById('btn');
            btn.innerText = "UPDATING SYSTEM...";
            btn.disabled = true;

            const newData = {
                appTitle: document.getElementById('appTitle').value,
                version: document.getElementById('version').value,
                platform: document.getElementById('platform').value,
                appServerStatus: document.getElementById('appServerStatus').value,
                currentFeatures: document.getElementById('currentFeatures').value,
                upcoming: document.getElementById('upcoming').value,
                about: document.getElementById('about').value
            };

            try {
                const url = `https://api.github.com/repos/${USER}/${REPO}/contents/${FILE}`;
                const getFile = await fetch(url, { headers: { "Authorization": `token ${token}` }});
                const fileData = await getFile.json();
                
                const response = await fetch(url, {
                    method: "PUT",
                    headers: { "Authorization": `token ${token}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        message: "System Admin Update",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if(response.ok) alert("✅ DEPLOYED: System is now " + newData.appServerStatus);
                else alert("❌ FAILED: GitHub rejected request.");
            } catch (e) { alert("Error: " + e.message); }
            finally { btn.innerText = "Push System Update"; btn.disabled = false; }
        }
    </script>
</body>
</html>
