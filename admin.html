<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Moviestream Admin | GitHub Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b0f19; color: white; }
        input, textarea { background: #1f2937; border: 1px solid #374151; padding: 12px; border-radius: 8px; color: white; width: 100%; margin-bottom: 15px; outline: none; }
        input:focus { border-color: #ef4444; }
    </style>
</head>
<body class="p-6 md:p-12">
    <div class="max-w-2xl mx-auto bg-gray-900 p-8 rounded-3xl border border-white/5">
        <h1 class="text-2xl font-black mb-6 text-red-500 flex items-center gap-2">
            <span class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></span> LIVE ADMIN PANEL
        </h1>
        
        <div class="space-y-4">
            <input type="text" id="appTitle" placeholder="App Title">
            <input type="text" id="appSubtitle" placeholder="Subtitle/Version Label">
            <input type="text" id="version" placeholder="Version (e.g. 1.0.5)">
            <input type="text" id="platform" placeholder="Development Tool">
            <input type="text" id="status" placeholder="Current Status">
            <textarea id="about" rows="4" placeholder="App Description"></textarea>
            
            <button onclick="updateGitHub()" id="saveBtn" class="w-full bg-red-600 hover:bg-red-700 py-4 rounded-xl font-bold uppercase tracking-widest transition-all">
                Push Update to GitHub
            </button>
        </div>
    </div>

    <script>
        const GITHUB_USER = "kanilkanchana";
        const REPO_NAME = "YOUR_REPO_NAME"; // Change this
        const JSON_PATH = "data.json";

        async function updateGitHub() {
            const token = prompt("Enter your GitHub Fine-grained Personal Access Token:");
            if (!token) return;

            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "UPLOADING...";
            saveBtn.disabled = true;

            const newData = {
                appTitle: document.getElementById('appTitle').value,
                appSubtitle: document.getElementById('appSubtitle').value,
                version: document.getElementById('version').value,
                platform: document.getElementById('platform').value,
                status: document.getElementById('status').value,
                about: document.getElementById('about').value
            };

            const url = `https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${JSON_PATH}`;

            try {
                // 1. Get the current file SHA (required by GitHub to update)
                const getFile = await fetch(url);
                const fileData = await getFile.json();
                const sha = fileData.sha;

                // 2. Push the update
                const response = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Admin: Update project details",
                        content: btoa(JSON.stringify(newData, null, 2)), // Encode to Base64
                        sha: sha
                    })
                });

                if (response.ok) {
                    alert("✅ Update Live! It may take 1-2 minutes for GitHub Pages to refresh.");
                } else {
                    const err = await response.json();
                    alert("❌ Error: " + err.message);
                }
            } catch (e) {
                alert("❌ Connection Failed: " + e.message);
            } finally {
                saveBtn.innerText = "Push Update to GitHub";
                saveBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
