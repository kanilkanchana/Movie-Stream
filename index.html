<script>
    const USER = "kanilkanchana";
    const REPO = "Movie-Stream"; 
    const FILE = "data.json";

    async function load() {
        try {
            // Fetch the data
            const r = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}?t=${Date.now()}`);
            const d = await r.json();
            
            // Basic Info
            document.getElementById('appTitle').innerText = d.appTitle;
            document.getElementById('about').innerText = d.about;

            // --- SERVER STATUS FIX ---
            const statusValue = d.appServerStatus || "Offline"; // Fallback to Offline if empty
            const statusDisplay = document.getElementById('appServerStatusDisplay');
            const statusBorder = document.getElementById('appStatusBorder');
            const banner = document.getElementById('alertBanner');

            statusDisplay.innerText = statusValue;
            
            if(statusValue.toLowerCase() === "online") {
                statusDisplay.style.color = "#22c55e"; // Green
                statusBorder.style.borderColor = "#22c55e";
                banner.classList.add('hidden');
            } else {
                statusDisplay.style.color = "#ef4444"; // Red
                statusBorder.style.borderColor = "#ef4444";
                banner.classList.remove('hidden');
                banner.innerText = `⚠️ SYSTEM ALERT: App Server is currently ${statusValue.toUpperCase()}`;
            }

            // --- UPCOMING FEATURES LIST FIX ---
            if(d.upcoming) {
                const items = d.upcoming.split(','); // Splits by comma
                const listContainer = document.getElementById('upcomingList');
                listContainer.innerHTML = ''; // Clear old list
                
                items.forEach(item => {
                    const li = document.createElement('li');
                    li.className = "flex items-center gap-2 mb-2";
                    li.innerHTML = `<span class="w-1.5 h-1.5 bg-red-600 rounded-full"></span> ${item.trim()}`;
                    listContainer.appendChild(li);
                });
            }

            // --- CURRENT FEATURES TAGS ---
            if(d.currentFeatures) {
                const feats = d.currentFeatures.split(',');
                const featDiv = document.getElementById('featuresList');
                featDiv.innerHTML = '';
                feats.forEach(f => {
                    featDiv.innerHTML += `<span class="feature-tag px-3 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider">${f.trim()}</span>`;
                });
            }

        } catch(e) { 
            console.error("Error loading data:", e);
            document.getElementById('appServerStatusDisplay').innerText = "ERROR";
        }
    }
    window.onload = load;
</script>
