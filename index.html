<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moviestream | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: linear-gradient(to top, #050505, transparent), url('https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=2000') center/cover; }
        .premium-btn { background: linear-gradient(90deg, #e50914, #ff0f1b); }
    </style>
</head>
<body>

<header class="h-[60vh] flex flex-col justify-center items-center text-center px-4 hero-gradient">
    <h1 id="app-title" class="text-6xl font-black mb-2 italic text-red-600">LOADING...</h1>
    <p id="app-subtitle" class="text-gray-400 text-lg max-w-2xl mb-6">Connecting to database...</p>
    <div class="flex gap-4">
        <button class="premium-btn px-8 py-3 rounded-full font-bold shadow-lg shadow-red-900/20">WATCH NOW</button>
        <a href="https://kanilkanchana.github.io/kanil-portfolio/index.html" class="bg-white/10 px-8 py-3 rounded-full font-bold backdrop-blur-md">CREATOR</a>
    </div>
</header>

<main class="container mx-auto px-6 -mt-10">
    <section class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
        <div class="glass p-6 rounded-2xl">
            <h3 class="text-red-500 font-bold text-xs uppercase mb-1">Build Version</h3>
            <p id="version-text" class="text-xl font-bold">--</p>
        </div>
        <div class="glass p-6 rounded-2xl">
            <h3 class="text-red-500 font-bold text-xs uppercase mb-1">Platform</h3>
            <p id="platform-text" class="text-xl font-bold">--</p>
        </div>
        <div class="glass p-6 rounded-2xl">
            <h3 class="text-red-500 font-bold text-xs uppercase mb-1">Status</h3>
            <p id="status-text" class="text-xl font-bold">--</p>
        </div>
    </section>

    <section class="glass p-10 rounded-3xl mb-20 border-l-4 border-red-600">
        <h2 class="text-2xl font-bold mb-4">Project Overview</h2>
        <p id="about-text" class="text-gray-400 leading-relaxed italic">Fetching latest updates...</p>
    </section>
</main>

<script>
    // Replace these with your actual details
    const GITHUB_USER = "kanilkanchana"; 
    const REPO_NAME = "Movie-Stream"; // Change this to your repository name
    const JSON_PATH = "data.json";

    async function fetchData() {
        try {
            // Fetch with cache-busting to ensure we see the latest update
            const response = await fetch(`https://raw.githubusercontent.com/${GITHUB_USER}/${REPO_NAME}/main/${JSON_PATH}?t=${new Date().getTime()}`);
            const data = await response.json();

            document.getElementById('app-title').innerText = data.appTitle;
            document.getElementById('app-subtitle').innerText = data.appSubtitle;
            document.getElementById('version-text').innerText = data.version;
            document.getElementById('platform-text').innerText = data.platform;
            document.getElementById('status-text').innerText = data.status;
            document.getElementById('about-text').innerText = data.about;
        } catch (error) {
            console.error("Error loading data:", error);
        }
    }
    window.onload = fetchData;
</script>
</body>
</html>
