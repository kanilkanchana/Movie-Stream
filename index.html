<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moviestream Pro | Official Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-glow { background: radial-gradient(circle at 50% -10%, #310a0a 0%, #020617 60%); }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .red-btn { background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%); transition: all 0.4s ease; }
        .red-btn:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(220, 38, 38, 0.2); }
        .feature-tag { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.2); color: #f87171; }
    </style>
</head>
<body class="hero-glow min-h-screen">

    <nav class="max-w-6xl mx-auto p-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold">M</div>
            <span class="text-xl font-extrabold tracking-tight uppercase">Moviestream <span class="text-red-500">Pro</span></span>
        </div>
        <a href="https://kanilkanchana.github.io/kanil-portfolio/index.html" class="glass px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-white/5 transition">The Creator</a>
    </nav>

    <header class="max-w-5xl mx-auto text-center pt-16 pb-20 px-6">
        <div id="status" class="inline-flex items-center gap-2 bg-white/5 border border-white/10 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase tracking-widest mb-6 text-red-400">
            <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
            LOADING...
        </div>
        <h1 id="appTitle" class="text-5xl md:text-6xl font-extrabold mb-4 tracking-tighter leading-tight uppercase">--</h1>
        <p id="appSubtitle" class="text-gray-400 text-base md:text-lg max-w-xl mx-auto mb-10 font-medium">--</p>
        <button class="red-btn px-10 py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Download Latest APK</button>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass p-8 rounded-3xl">
                <h4 class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-4">Software Version</h4>
                <p id="version" class="text-xl font-semibold">--</p>
            </div>
            <div class="glass p-8 rounded-3xl">
                <h4 class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-4">Engine / Framework</h4>
                <p id="platform" class="text-xl font-semibold">--</p>
            </div>
        </div>

        <div class="glass p-10 rounded-[2.5rem] mb-12">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <span class="w-2 h-6 bg-red-600 rounded-full"></span> Active Features
            </h2>
            <div id="featuresList" class="flex flex-wrap gap-3 italic">
                </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <section class="glass p-10 rounded-[2.5rem] md:col-span-2">
                <h2 class="text-xl font-bold mb-4 uppercase tracking-tight">Project Overview</h2>
                <p id="about" class="text-gray-400 text-sm leading-relaxed mb-6">--</p>
                <div class="pt-6 border-t border-white/5">
                    <p class="text-[10px] font-bold uppercase text-gray-500 mb-1">Lead Developer</p>
                    <a href="https://kanilkanchana.github.io/kanil-portfolio/index.html" class="text-red-500 font-bold hover:underline">Kanil Kanchana</a>
                </div>
            </section>

            <section class="glass p-10 rounded-[2.5rem] border-t-4 border-t-red-600">
                <h2 class="text-xl font-bold mb-4 uppercase tracking-tight">Pipeline</h2>
                <p id="upcoming" class="text-gray-400 text-sm leading-relaxed italic">--</p>
            </section>
        </div>
    </main>

    <script>
        const USER = "kanilkanchana";
        const REPO = "Movie-Stream"; 
        const FILE = "data.json";

        async function load() {
            try {
                const r = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}?t=${Date.now()}`);
                const d = await r.json();
                
                document.getElementById('appTitle').innerText = d.appTitle;
                document.getElementById('appSubtitle').innerText = d.appSubtitle;
                document.getElementById('version').innerText = d.version;
                document.getElementById('platform').innerText = d.platform;
                document.getElementById('status').innerHTML = `<span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span> ${d.status}`;
                document.getElementById('upcoming').innerText = d.upcoming;
                document.getElementById('about').innerText = d.about;

                // Load Current Features as Tags
                const features = d.currentFeatures.split(',');
                const list = document.getElementById('featuresList');
                list.innerHTML = '';
                features.forEach(f => {
                    list.innerHTML += `<span class="feature-tag px-4 py-2 rounded-lg text-xs font-semibold">${f.trim()}</span>`;
                });

            } catch(e) { console.error("Load failed", e); }
        }
        window.onload = load;
    </script>
</body>
</html>
