<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantix Pro | System Status</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-glow { background: radial-gradient(circle at 50% -10%, #310a0a 0%, #020617 60%); }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .red-btn { background: linear-gradient(135deg, #991b1b 0%, #dc2626 100%); transition: 0.4s ease; }
        .feature-tag { background: rgba(220, 38, 38, 0.1); border: 1px solid rgba(220, 38, 38, 0.2); color: #f87171; }
        
        /* Status Colors */
        .status-online { color: #22c55e; }
        .status-offline { color: #ef4444; }
        .status-maintenance { color: #f59e0b; }
    </style>
</head>
<body class="hero-glow min-h-screen">

    <div id="alertBanner" class="hidden bg-red-600 text-white text-center py-2 text-xs font-bold uppercase tracking-widest">
        ⚠️ App Server is currently offline for maintenance. Website features remain active.
    </div>

    <nav class="max-w-6xl mx-auto p-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold italic">V</div>
            <span class="text-xl font-extrabold tracking-tight uppercase italic">Vantix <span class="text-red-500">PRO</span></span>
        </div>
        <a href="https://kanilkanchana.github.io/kanil-portfolio/index.html" class="glass px-5 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-white/5 transition">Creator</a>
    </nav>

    <header class="max-w-5xl mx-auto text-center pt-10 pb-16 px-6">
        <h1 id="appTitle" class="text-4xl md:text-6xl font-extrabold mb-4 tracking-tighter uppercase leading-tight">--</h1>
        <p id="appSubtitle" class="text-gray-400 text-base italic mb-10">--</p>
        
        <div class="grid grid-cols-2 gap-4 max-w-sm mx-auto mb-10">
            <div class="glass p-4 rounded-2xl border-t-2 border-green-500/50">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-1">Site Server</p>
                <p id="siteStatus" class="text-sm font-bold status-online tracking-widest uppercase italic font-black text-green-500">Online</p>
            </div>
            <div class="glass p-4 rounded-2xl border-t-2 border-red-500/50" id="appStatusCard">
                <p class="text-[10px] font-black text-gray-500 uppercase mb-1">App Server</p>
                <p id="appStatus" class="text-sm font-bold tracking-widest uppercase italic font-black">--</p>
            </div>
        </div>

        <button class="red-btn px-10 py-4 rounded-xl font-bold text-xs uppercase tracking-widest shadow-lg">Download Build</button>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass p-8 rounded-3xl">
                <h4 class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-4">Version Control</h4>
                <p id="version" class="text-xl font-semibold">--</p>
            </div>
            <div class="glass p-8 rounded-3xl">
                <h4 class="text-gray-500 text-[10px] font-black uppercase tracking-widest mb-4">Native Engine</h4>
                <p id="platform" class="text-xl font-semibold">--</p>
            </div>
        </div>

        <div class="glass p-10 rounded-[2.5rem] mb-12">
            <h2 class="text-xl font-bold mb-6 flex items-center gap-2 uppercase tracking-widest">
                <span class="w-2 h-5 bg-red-600 rounded-full"></span> Live Features
            </h2>
            <div id="featuresList" class="flex flex-wrap gap-3 italic"></div>
        </div>

        <section class="glass p-10 rounded-[2.5rem]">
            <h2 class="text-xl font-bold mb-4 uppercase tracking-tight">Project Overview</h2>
            <p id="about" class="text-gray-400 text-sm leading-relaxed mb-8">--</p>
            <div class="pt-6 border-t border-white/5 flex justify-between items-center">
                <p class="text-red-500 font-bold italic">Developed by Kanil Kanchana</p>
                <p id="upcoming" class="text-xs text-gray-500 font-bold uppercase tracking-tighter">--</p>
            </div>
        </section>
    </main>

    <script>
        const USER = "kanilkanchana";
        const REPO = "Movie-Stream"; 
        const FILE = "data.json";

        async function load() {
            try {
                const r = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}?t=${Date.now()}`);
                const d = await r.json();
                
                document.getElementById('appTitle').innerText = d.appTitle;
                document.getElementById('appSubtitle').innerText = d.appSubtitle;
                document.getElementById('version').innerText = d.version;
                document.getElementById('platform').innerText = d.platform;
                document.getElementById('upcoming').innerText = "Next: " + d.upcoming;
                document.getElementById('about').innerText = d.about;

                // Handle App Server Status Logic
                const appStatusEl = document.getElementById('appStatus');
                const appCard = document.getElementById('appStatusCard');
                const banner = document.getElementById('alertBanner');
                
                const status = d.appServerStatus.toLowerCase();
                appStatusEl.innerText = status;

                if(status === "online") {
                    appStatusEl.className = "text-sm font-bold status-online tracking-widest uppercase italic";
                    appCard.style.borderColor = "#22c55e";
                } else {
                    // Logic: If App Server is anything but online, show warning
                    appStatusEl.className = "text-sm font-bold status-offline tracking-widest uppercase italic animate-pulse";
                    appCard.style.borderColor = "#ef4444";
                    banner.classList.remove('hidden'); // Show the top red banner
                    banner.innerText = `⚠️ SYSTEM ALERT: App Server is ${status.toUpperCase()}. Visit Site for Updates.`;
                }

                if(d.currentFeatures) {
                    const features = d.currentFeatures.split(',');
                    const list = document.getElementById('featuresList');
                    list.innerHTML = '';
                    features.forEach(f => {
                        list.innerHTML += `<span class="feature-tag px-4 py-2 rounded-lg text-xs font-semibold">${f.trim()}</span>`;
                    });
                }
            } catch(e) { console.error(e); }
        }
        window.onload = load;
    </script>
</body>
</html>
