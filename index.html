<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTIX Pro | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .hero-glow { background: radial-gradient(circle at 50% -10%, #310a0a 0%, #020617 60%); }
        .glass { background: rgba(255, 255, 255, 0.01); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .status-alert { background: linear-gradient(90deg, #991b1b, #450a0a); border: 1px solid #ef4444; }
    </style>
</head>
<body class="hero-glow min-h-screen">

    <nav class="max-w-6xl mx-auto p-8 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-bold italic">V</div>
            <span class="text-xl font-extrabold tracking-tight uppercase italic">Vantix <span class="text-red-500">PRO</span></span>
        </div>
        <a href="#" class="text-xs font-bold uppercase tracking-widest opacity-50">v1.0.2</a>
    </nav>

    <header class="max-w-5xl mx-auto text-center pt-10 pb-12 px-6">
        <div id="customAlert" class="hidden max-w-2xl mx-auto mb-10 status-alert p-6 rounded-2xl shadow-2xl animate-bounce">
            <p class="text-[10px] font-black uppercase tracking-widest mb-2 text-red-300">System Announcement</p>
            <h2 id="statusTitle" class="text-lg font-bold mb-1 uppercase tracking-tighter">--</h2>
            <p id="statusDescription" class="text-sm opacity-80 italic">--</p>
        </div>

        <h1 id="appTitle" class="text-6xl font-black mb-4 tracking-tighter uppercase italic">--</h1>
        
        <div class="grid grid-cols-2 gap-4 max-w-xs mx-auto mb-10">
            <div class="glass p-3 rounded-xl border-t border-green-500">
                <p class="text-[9px] font-bold text-gray-500 uppercase">Site Server</p>
                <p class="text-xs font-black text-green-500 uppercase italic">Online</p>
            </div>
            <div class="glass p-3 rounded-xl border-t" id="appStatusBorder">
                <p class="text-[9px] font-bold text-gray-500 uppercase">App Core</p>
                <p id="appServerStatusDisplay" class="text-xs font-black uppercase italic tracking-widest">--</p>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-20 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="glass p-8 rounded-[2rem] md:col-span-2">
            <h2 class="text-sm font-black mb-6 uppercase text-red-500 italic">Active Modules</h2>
            <div id="featuresList" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="glass p-8 rounded-[2rem] border-l-2 border-red-600">
            <h2 class="text-sm font-black mb-6 uppercase text-gray-400 italic">Pipeline</h2>
            <ul id="upcomingList" class="space-y-4 text-xs font-bold italic text-gray-300 uppercase"></ul>
        </div>
    </main>

    <script>
        const USER = "kanilkanchana";
        const REPO = "Movie-Stream"; 
        const FILE = "data.json";

        async function load() {
            try {
                const r = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}?t=${Date.now()}`);
                const d = await r.json();
                
                document.getElementById('appTitle').innerText = d.appTitle;

                // SERVER STATUS & CUSTOM MESSAGE LOGIC
                const status = d.appServerStatus || "Offline";
                const display = document.getElementById('appServerStatusDisplay');
                const border = document.getElementById('appStatusBorder');
                const alertBox = document.getElementById('customAlert');

                display.innerText = status;
                
                if(status.toLowerCase() === "online") {
                    display.style.color = "#22c55e";
                    border.style.borderColor = "#22c55e";
                    alertBox.classList.add('hidden');
                } else {
                    display.style.color = "#ef4444";
                    border.style.borderColor = "#ef4444";
                    // Show Custom Message
                    alertBox.classList.remove('hidden');
                    document.getElementById('statusTitle').innerText = "System is " + status;
                    document.getElementById('statusDescription').innerText = d.statusMessage || "Please wait while we stabilize the core.";
                }

                // Features & Upcoming Lists
                if(d.currentFeatures) {
                    const feat = d.currentFeatures.split(',');
                    const featDiv = document.getElementById('featuresList');
                    featDiv.innerHTML = '';
                    feat.forEach(f => {
                        featDiv.innerHTML += `<span class="bg-white/5 border border-white/10 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase mr-2 mb-2 inline-block">${f.trim()}</span>`;
                    });
                }

                if(d.upcoming) {
                    const items = d.upcoming.split(',');
                    const upList = document.getElementById('upcomingList');
                    upList.innerHTML = '';
                    items.forEach(item => {
                        upList.innerHTML += `<li class="flex items-center gap-3"><span class="w-1.5 h-1.5 bg-red-600 rounded-full"></span><span>${item.trim()}</span></li>`;
                    });
                }
            } catch(e) { console.error(e); }
        }
        window.onload = load;
    </script>
</body>
</html>
