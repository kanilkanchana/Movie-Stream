<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moviestream | Premium Android</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .hero-glow { background: radial-gradient(circle at 50% -20%, #7f1d1d 0%, #020617 65%); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .red-btn { background: linear-gradient(to right, #b91c1c, #ef4444); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .red-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(220, 38, 38, 0.3); }
    </style>
</head>
<body class="hero-glow min-h-screen">

    <nav class="max-w-7xl mx-auto p-8 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center font-black italic">M</div>
            <span class="text-2xl font-black tracking-tighter uppercase italic">Moviestream</span>
        </div>
        <a href="https://kanilkanchana.github.io/kanil-portfolio/index.html" class="glass px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-white/10 transition">Portfolio</a>
    </nav>

    <header class="text-center pt-24 pb-16 px-6">
        <div id="status" class="inline-flex items-center gap-2 bg-red-950/40 text-red-400 border border-red-500/20 px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-8">
            <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
            Syncing...
        </div>
        <h1 id="appTitle" class="text-7xl md:text-9xl font-black mb-6 tracking-tighter text-white uppercase italic">MOVIESTREAM</h1>
        <p id="appSubtitle" class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-12 font-medium leading-relaxed italic uppercase tracking-wider">Premium Android Application</p>
        <button class="red-btn px-12 py-5 rounded-2xl font-black text-sm tracking-widest shadow-2xl">GET THE APP NOW</button>
    </header>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8 pb-32">
        <div class="glass p-10 rounded-[2.5rem] group hover:border-red-500/30 transition">
            <h4 class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-4">Core Engine</h4>
            <p id="platform" class="text-3xl font-bold">--</p>
        </div>
        <div class="glass p-10 rounded-[2.5rem] group hover:border-red-500/30 transition">
            <h4 class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-4">Latest Version</h4>
            <p id="version" class="text-3xl font-bold">--</p>
        </div>
        <div class="glass p-10 rounded-[2.5rem] group hover:border-red-500/30 transition">
            <h4 class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-4">Pipeline</h4>
            <p id="upcoming" class="text-3xl font-bold">--</p>
        </div>

        <section class="glass p-12 rounded-[3.5rem] md:col-span-3 border-l-8 border-l-red-600">
            <h2 class="text-4xl font-black mb-6 uppercase tracking-tight">Project Vision</h2>
            <p id="about" class="text-gray-400 text-xl leading-relaxed italic italic">Connecting to secure server...</p>
        </section>
    </main>

    <script>
        const USER = "kanilkanchana";
        const REPO = "YOUR_REPO_NAME"; // <-- CHANGE THIS
        const FILE = "data.json";

        async function load() {
            try {
                const r = await fetch(`https://raw.githubusercontent.com/${USER}/${REPO}/main/${FILE}?t=${Date.now()}`);
                const d = await r.json();
                document.getElementById('appTitle').innerText = d.appTitle;
                document.getElementById('appSubtitle').innerText = d.appSubtitle;
                document.getElementById('version').innerText = d.version;
                document.getElementById('platform').innerText = d.platform;
                document.getElementById('status').innerHTML = `<span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span> ${d.status}`;
                document.getElementById('upcoming').innerText = d.upcoming;
                document.getElementById('about').innerText = d.about;
            } catch(e) { console.error(e) }
        }
        window.onload = load;
    </script>
</body>
</html>
